naftiko: "1.0.0-alpha1"

info:
  label: Amazon Direct Connect Hybrid Network Connectivity
  description: >-
    Workflow capability for network engineers and cloud architects to manage
    dedicated private connections between on-premises networks and AWS using
    Amazon Direct Connect. Covers connection provisioning, virtual interface
    management, gateway associations, LAG configuration, and network troubleshooting.
  tags:
    - Amazon Direct Connect
    - Hybrid Cloud
    - Network Engineering
    - Dedicated Connection
    - AWS
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - import: direct-connect
      location: ./shared/direct-connect-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: hybrid-network-connectivity-api
      description: Unified REST API for Amazon Direct Connect hybrid network connectivity workflows.
      resources:
        - path: /v1/connections
          name: connections
          description: Dedicated physical connections to AWS
          operations:
            - method: GET
              name: describe-connections
              description: List all Direct Connect connections
              call: "direct-connect.describe-connections"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-connection
              description: Create a new dedicated connection
              call: "direct-connect.create-connection"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/virtual-interfaces
          name: virtual-interfaces
          description: Virtual interfaces providing network access
          operations:
            - method: GET
              name: describe-virtual-interfaces
              description: List all virtual interfaces
              call: "direct-connect.describe-virtual-interfaces"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-private-vif
              description: Create a private virtual interface for VPC access
              call: "direct-connect.create-private-virtual-interface"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-transit-vif
              description: Create a transit virtual interface for Transit Gateway
              call: "direct-connect.create-transit-virtual-interface"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/gateways
          name: gateways
          description: Direct Connect gateways for multi-VPC and multi-region access
          operations:
            - method: GET
              name: describe-gateways
              description: List Direct Connect gateways
              call: "direct-connect.describe-direct-connect-gateways"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-gateway
              description: Create a Direct Connect gateway
              call: "direct-connect.create-direct-connect-gateway"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/lags
          name: lags
          description: Link aggregation groups for redundant connections
          operations:
            - method: GET
              name: describe-lags
              description: List link aggregation groups
              call: "direct-connect.describe-lags"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-lag
              description: Create a link aggregation group
              call: "direct-connect.create-lag"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/locations
          name: locations
          description: Available Direct Connect locations
          operations:
            - method: GET
              name: describe-locations
              description: List Direct Connect colocation facilities
              call: "direct-connect.describe-locations"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: hybrid-network-connectivity-mcp
      transport: http
      description: MCP server for AI-assisted Direct Connect hybrid network management.
      tools:
        - name: describe-connections
          description: List all Direct Connect dedicated connections in the account
          hints:
            readOnly: true
            openWorld: true
          call: "direct-connect.describe-connections"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-connection
          description: Create a new dedicated physical connection at a Direct Connect location
          hints:
            readOnly: false
            destructive: false
          call: "direct-connect.create-connection"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-connection
          description: Delete a Direct Connect connection
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "direct-connect.delete-connection"
          outputParameters:
            - type: object
              mapping: "$."

        - name: describe-virtual-interfaces
          description: List all virtual interfaces configured on Direct Connect connections
          hints:
            readOnly: true
            openWorld: true
          call: "direct-connect.describe-virtual-interfaces"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-private-virtual-interface
          description: Create a private virtual interface for accessing a VPC via Direct Connect
          hints:
            readOnly: false
            destructive: false
          call: "direct-connect.create-private-virtual-interface"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-transit-virtual-interface
          description: Create a transit virtual interface for accessing Transit Gateway via Direct Connect
          hints:
            readOnly: false
            destructive: false
          call: "direct-connect.create-transit-virtual-interface"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-virtual-interface
          description: Delete a virtual interface from a Direct Connect connection
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "direct-connect.delete-virtual-interface"
          outputParameters:
            - type: object
              mapping: "$."

        - name: describe-direct-connect-gateways
          description: List Direct Connect gateways for multi-region and multi-VPC connectivity
          hints:
            readOnly: true
            openWorld: true
          call: "direct-connect.describe-direct-connect-gateways"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-direct-connect-gateway
          description: Create a Direct Connect gateway to attach multiple VPCs across regions
          hints:
            readOnly: false
            destructive: false
          call: "direct-connect.create-direct-connect-gateway"
          outputParameters:
            - type: object
              mapping: "$."

        - name: describe-lags
          description: List link aggregation groups providing redundant bundled connections
          hints:
            readOnly: true
            openWorld: true
          call: "direct-connect.describe-lags"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-lag
          description: Create a link aggregation group to bundle multiple connections for redundancy
          hints:
            readOnly: false
            destructive: false
          call: "direct-connect.create-lag"
          outputParameters:
            - type: object
              mapping: "$."

        - name: describe-locations
          description: List all available Direct Connect colocation facility locations
          hints:
            readOnly: true
            openWorld: true
          call: "direct-connect.describe-locations"
          outputParameters:
            - type: object
              mapping: "$."
