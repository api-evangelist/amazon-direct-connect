naftiko: "1.0.0-alpha1"

info:
  label: Amazon Direct Connect API
  description: Amazon Direct Connect API for managing dedicated network connections, virtual interfaces, gateways, and link aggregation groups between on-premises networks and AWS.
  tags:
    - Amazon Direct Connect
    - Networking
    - Hybrid Cloud
    - Dedicated Connection
    - AWS
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: direct-connect
      baseUri: https://directconnect.us-east-1.amazonaws.com
      description: Amazon Direct Connect REST API for managing hybrid network connectivity.
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: connections
          path: /
          description: Dedicated physical connections to AWS
          operations:
            - name: describe-connections
              method: POST
              description: Displays all connections in this Region
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-connection
              method: POST
              description: Creates a connection between a customer network and an AWS Direct Connect location
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-connection
              method: POST
              description: Deletes the specified connection
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: virtual-interfaces
          path: /
          description: Virtual interfaces on connections
          operations:
            - name: describe-virtual-interfaces
              method: POST
              description: Displays all virtual interfaces for an AWS account
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-private-virtual-interface
              method: POST
              description: Creates a private virtual interface for access to Amazon VPC
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-public-virtual-interface
              method: POST
              description: Creates a public virtual interface for access to public AWS services
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-transit-virtual-interface
              method: POST
              description: Creates a transit virtual interface for access to AWS Transit Gateway
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-virtual-interface
              method: POST
              description: Deletes a virtual interface
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: direct-connect-gateways
          path: /
          description: Direct Connect gateways for multi-VPC and multi-region access
          operations:
            - name: describe-direct-connect-gateways
              method: POST
              description: Lists all Direct Connect gateways in your AWS account
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-direct-connect-gateway
              method: POST
              description: Creates a Direct Connect gateway
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-direct-connect-gateway
              method: POST
              description: Deletes the specified Direct Connect gateway
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: lags
          path: /
          description: Link aggregation groups (LAGs)
          operations:
            - name: describe-lags
              method: POST
              description: Describes all Link Aggregation Groups in your account
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-lag
              method: POST
              description: Creates a link aggregation group (LAG) with the specified number of bundled connections
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-lag
              method: POST
              description: Deletes the specified LAG
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: locations
          path: /
          description: Direct Connect locations
          operations:
            - name: describe-locations
              method: POST
              description: Lists the Direct Connect locations in the current Region
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: direct-connect-rest
      resources:
        - path: /v1/connections
          name: connections
          description: Direct Connect connections
          operations:
            - method: GET
              name: describe-connections
              description: List Direct Connect connections
              call: "direct-connect.describe-connections"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-connection
              description: Create a new Direct Connect connection
              call: "direct-connect.create-connection"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/virtual-interfaces
          name: virtual-interfaces
          description: Virtual interfaces on connections
          operations:
            - method: GET
              name: describe-virtual-interfaces
              description: List virtual interfaces
              call: "direct-connect.describe-virtual-interfaces"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/gateways
          name: gateways
          description: Direct Connect gateways
          operations:
            - method: GET
              name: describe-gateways
              description: List Direct Connect gateways
              call: "direct-connect.describe-direct-connect-gateways"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: direct-connect-mcp
      transport: http
      tools:
        - name: describe-connections
          description: List all Direct Connect connections
          hints:
            readOnly: true
            openWorld: true
          call: "direct-connect.describe-connections"
          outputParameters:
            - type: object
              mapping: "$."

        - name: describe-virtual-interfaces
          description: List all virtual interfaces for network connectivity
          hints:
            readOnly: true
            openWorld: true
          call: "direct-connect.describe-virtual-interfaces"
          outputParameters:
            - type: object
              mapping: "$."

        - name: describe-direct-connect-gateways
          description: List Direct Connect gateways for multi-VPC access
          hints:
            readOnly: true
            openWorld: true
          call: "direct-connect.describe-direct-connect-gateways"
          outputParameters:
            - type: object
              mapping: "$."

        - name: describe-locations
          description: List available Direct Connect locations in the current region
          hints:
            readOnly: true
            openWorld: true
          call: "direct-connect.describe-locations"
          outputParameters:
            - type: object
              mapping: "$."
