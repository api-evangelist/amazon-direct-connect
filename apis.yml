apis:
  - name: Amazon Direct Connect API
    description: >-
      The AWS Direct Connect API provides programmatic access to create and
      manage dedicated network connections between your on-premises network
      and AWS, including connections, virtual interfaces, gateways, and
      link aggregation groups. Covers 63 operations for full lifecycle management
      of hybrid network connectivity.
