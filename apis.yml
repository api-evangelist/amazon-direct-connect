name: Amazon Direct Connect
description: >-
  AWS Direct Connect links your internal network to an AWS Direct Connect
  location over a standard Ethernet fiber-optic cable. With this connection,
  you can create virtual interfaces directly to public AWS services or to
  Amazon VPC, bypassing internet service providers in your network path. An
  AWS Direct Connect location provides access to AWS in the region with which
  it is associated, providing reduced network costs, increased bandwidth
  throughput, and a more consistent network experience.
